image klippos.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition bios-boot {
        partition-type-uuid = 21686148-6449-6E6F-744E-656564454649
        size = 1M
    }

    partition boot {
        partition-type-uuid = U
        bootable = true
        image = "boot.vfat"
        size = 64M
    }

    partition rootfs {
        partition-type-uuid = L
        image = "rootfs-debian.ext4"
    }
}
