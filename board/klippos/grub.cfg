set default="0"
set timeout="3"

insmod part_gpt
insmod ext2
insmod linux

menuentry "KlippOS" {
    search --no-floppy --label --set=root klippos-root
    linux /boot/bzImage root=LABEL=klippos-root rootwait rw console=tty1 quiet
}

menuentry "KlippOS (verbose)" {
    search --no-floppy --label --set=root klippos-root
    linux /boot/bzImage root=LABEL=klippos-root rootwait rw console=tty1
}

menuentry "KlippOS (recovery)" {
    search --no-floppy --label --set=root klippos-root
    linux /boot/bzImage root=LABEL=klippos-root rootwait rw console=tty1 systemd.unit=multi-user.target
}
