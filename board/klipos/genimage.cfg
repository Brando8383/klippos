image boot.vfat {
    vfat {
        files = {
            "bzImage",
            "efi-part/EFI"
        }
    }
    size = 64M
}

image klipos.img {
    hdimage {
        gpt = true
    }

    partition boot {
        partition-type-uuid = U
        bootable = true
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type-uuid = L
        image = "rootfs.ext4"
    }
}
